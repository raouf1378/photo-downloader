name: Download images and zip
on:
  workflow_dispatch:
    inputs:
      image_urls:
        description: 'Enter image URLs separated by commas'
        required: true
        default: 'https://example.com/image1.jpg,https://example.com/image2.png'
jobs:
  download_and_zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
- name: Set up variables
        run: |
          echo "IMAGE_URLS=${{ github.event.inputs.image_urls }}" >> $GITHUB_ENV
          # تبدیل رشته به آرایه
          IFS=',' read -r -a URLS <<< "$IMAGE_URLS"
          echo "URLS=${URLS[@]}" >> $GITHUB_ENV
- name: Create images directory
        run: mkdir -p images
- name: Download images
        run: |
          IFS=',' read -r -a URLS <<< "$IMAGE_URLS"
          for url in "${URLS[@]}"
          do
            filename=$(basename "$url")
            curl -L -o "images/$filename" "$url"
          done
- name: Create zip file
        run: |
          zip -r images.zip images
- name: Move zip to project directory
        run: |
          mv images.zip ./images.zip
- name: Commit zip file
        run: |
          git add images.zip
          git commit -m "Add images zip"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
